name: Sdist-installation

on:
  workflow_dispatch:
    inputs:
      python_version:
        required: true
        type: string
        default: '3.10'
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.10'
  push:
    branches: [devel, main]

jobs:
  Python_version_picker:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.repository == 'pyccel/pyccel'
    outputs:
      python_version: ${{ steps.set-python_version.outputs.python_version }}
    steps:
    - if: github.event_name == 'push'
      run: |
        echo "version=3.10" >> $GITHUB_ENV
      shell: bash
    - if: github.event_name != 'push'
      run: |
        echo "version=${{ inputs.python_version }}" >> $GITHUB_ENV
      shell: bash
    - id: set-python_version
      run: |
        echo "python_version=$version" >> $GITHUB_OUTPUT
      shell: bash

  Sdist-installation:
    runs-on: ubuntu-latest
    name: Test deployment
    needs: Python_version_picker

    steps:
      - id: duplicate_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          skip_after_successful_duplicate: 'true'
          paths: '["pyccel/**", "pyproject.toml", "install_scripts/**", ".github/workflows/sdist.yml", ".github/actions/**"]'
          paths_ignore: '["pyccel/version.py"]'
          do_not_skip: '["push"]'

      - uses: actions/checkout@v6
        with:
          submodules: true
          path: pyccel_download
      - name: Set up Python ${{ needs.Python_version_picker.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.Python_version_picker.outputs.python_version }}
      - name: Install dependencies
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: ./pyccel_download/.github/actions/linux_install
      - name: Install Pyccel from sdist
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: sdist_creation
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build
          python -m build --sdist
          cp dist/*.tar.gz ..
        working-directory: ./pyccel_download
        shell: bash
      - name: Install Pyccel from sdist
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: sdist_installation
        run: |
          python -m pip install *.tar.gz
        shell: bash
      - name: Check for STC installation
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: stc_check
        uses: ./pyccel_download/.github/actions/check_for_stc
      - name: Check for gFTL installation
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: gFTL_check
        uses: ./pyccel_download/.github/actions/check_for_gftl

name: Spellcheck Action

on:
  workflow_dispatch:
    inputs:
      python_version:
        required: true
        type: string
        default: '3.13'
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.13'

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  Spelling:
    runs-on: ubuntu-latest
    name: Documentation spellcheck (spelling, ${{ inputs.python_version }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install pyspelling
          python -m pip install pymdown-extensions
          # Install any additional libraries required: additional plugins, documentation building libraries, etc.
      - name: Install Aspell
        run: |
          sudo apt-get install aspell aspell-en
      - name: Spell check
        id: spelling
        run: |
           python -m pyspelling > misspellings.txt || true
           cat misspellings.txt
           python ci_tools/summarise_pyspelling.py misspellings.txt $GITHUB_STEP_SUMMARY
      - name: Common spelling problems
        id: manual_spelling
        run: |
          python ci_tools/check_python_capitalisation.py >> $GITHUB_STEP_SUMMARY
      - name: Code spell check
        uses: crate-ci/typos@v1.29.10
        with:
          config: ./.typos.toml

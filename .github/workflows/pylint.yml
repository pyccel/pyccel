name: Python Linting

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.10'
      base:
        required: false
        type: string
  push:
    branches: ebourne_pylint

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  BASE: ${{ inputs.base || github.event.pull_request.base.sha }}

jobs:
  Linter:
    runs-on: ubuntu-latest
    name: Python best practices (pylint, ${{ inputs.python_version }})

    steps:
      - id: duplicate_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          skip_after_successful_duplicate: 'true'
          paths: '["**/*.py", ".github/workflows/pylint.yml"]'
          do_not_skip: '["push"]'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install python dependencies
        if: steps.duplicate_check.outputs.should_skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pylint
        shell: bash
      - uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # v1.4.0
        if: steps.duplicate_check.outputs.should_skip != 'true'
        with:
          reviewdog_version: latest # Optional. [latest,nightly,v.X.Y.Z]
      - name: Run Pylint
        if: steps.duplicate_check.outputs.should_skip != 'true'
        run: |
          reviewdog -reporter=github-pr-check -runners=pylint -diff="git diff FETCH_HEAD"
        shell: bash
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}


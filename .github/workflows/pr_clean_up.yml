name: Update PR following unit tests

on:
  workflow_run:
    workflows: ["PR Tests"]
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  update_status:
    name: Update PR status
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Find PR number
        id: find_pr
        run: |
          PR_NUMBER=$(gh pr list --state open --json number,headRefOid \
            --jq '.[] | select(.headRefOid == "${{ github.event.workflow_run.head_sha }}") | .number')
          echo "pr_number=$PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Check status
        id: status_check
        if: steps.find_pr.outputs.pr_number != ''
        run: |
          gh pr checks ${{ steps.find_pr.outputs.pr_number }} --required --watch || true
          status=$(gh pr checks ${{ steps.find_pr.outputs.pr_number }} --required --json state --jq '.[]["state"]' | sort -u)
          if [[ $status == "SUCCESS" ]]
          then
            conclusion="SUCCESS"
          elif [[ $status == *"FAILURE"* ]]
          then
            conclusion="FAILURE"
          fi
          echo "conclusion=$conclusion"
          echo "conclusion=$conclusion" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Convert PR to draft
        if: steps.find_pr.outputs.pr_number != '' && steps.status_check.outputs.conclusion == 'FAILURE'
        run: |
          gh pr ready ${{ steps.find_pr.outputs.pr_number }} --undo
          gh pr edit ${{ steps.find_pr.outputs.pr_number }} --remove-label needs_initial_review
          gh pr edit ${{ steps.find_pr.outputs.pr_number }} --remove-label Ready_for_review
          gh pr edit ${{ steps.find_pr.outputs.pr_number }} --remove-label Ready_to_merge
          gh pr comment ${{ steps.find_pr.outputs.pr_number }} --body "Unfortunately your PR is not passing the tests so it is not quite ready for review yet."
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Update label
        id: update_label
        if: steps.find_pr.outputs.pr_number != '' && steps.status_check.outputs.conclusion == 'SUCCESS'
        uses: ./.github/actions/update_review_label
        with:
          pr_number: ${{ steps.find_pr.outputs.pr_number }}
      - name: Post comment
        if: steps.find_pr.outputs.pr_number != '' && steps.status_check.outputs.conclusion == 'SUCCESS'
        run: |
          if [ -n "${{ steps.update_label.outputs.requesters }}" ]; then
            MESSAGE=$(sed "s/{reviewers}/${{ steps.update_label.outputs.requesters }}/g; s/{author}/${{ steps.update_label.outputs.author }}/g" \
              ci_tools/bot_messages/rerequest_review.txt)
            gh pr comment ${{ steps.find_pr.outputs.pr_number }} --body "$MESSAGE"
          elif [ "${{ steps.update_label.outputs.label }}" = "needs_initial_review" ]; then
            MESSAGE=$(sed "s/{author}/${{ steps.update_label.outputs.author }}/g" ci_tools/bot_messages/new_pr.txt)
            gh pr comment ${{ steps.find_pr.outputs.pr_number }} --body "$MESSAGE"
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}

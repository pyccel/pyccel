name: Update PR following unit tests

on:
  workflow_run:
    workflows: ["PR Tests"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  update_status:
    name: Update PR status
    runs-on: ubuntu-latest

    steps:
      - name: Find PR number
        id: find_pr
        run: |
          PR_NUMBER=$(gh pr list --state open --json number,headRefOid \
            --jq '.[] | select(.headRefOid == "${{ github.event.workflow_run.head_sha }}") | .number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Convert PR to draft
        if: steps.find_pr.outputs.pr_number != '' && github.event.workflow_run.conclusion == 'failure'
        run: |
          gh pr ready ${{ steps.find_pr.outputs.pr_number }} --undo
          gh pr comment ${{ steps.find_pr.outputs.pr_number }} --body "Unfortunately your PR is not passing the tests so it is not quite ready for review yet."
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/checkout@v4
        if: steps.find_pr.outputs.pr_number != '' && github.event.workflow_run.conclusion == 'success'
      - name: Update label and post comment
        if: steps.find_pr.outputs.pr_number != '' && github.event.workflow_run.conclusion == 'success'
        run: |
          PR_NUMBER=${{ steps.find_pr.outputs.pr_number }}
          PR_INFO=$(gh pr view $PR_NUMBER --json author,reviews)
          AUTHOR=$(echo "$PR_INFO" | jq -r '.author.login')
          REVIEW_DATA=$(echo "$PR_INFO" | jq '
            def effective_reviews:
              .reviews | sort_by(.submittedAt) | group_by(.author.login) | map(last) | .[] | select(.author.login != "pyccel-bot");
            {
              requesters: ([effective_reviews | select(.state == "CHANGES_REQUESTED") | "@" + .author.login] | join(", ")),
              senior_approved: ([effective_reviews | select(.state == "APPROVED" and (.author.login == "yguclu" or .author.login == "EmilyBourne"))] | length > 0),
              junior_approved: ([effective_reviews | select(.state == "APPROVED" and .author.login != "yguclu" and .author.login != "EmilyBourne")] | length > 0)
            }')
          REQUESTERS=$(echo "$REVIEW_DATA" | jq -r '.requesters')
          SENIOR_APPROVED=$(echo "$REVIEW_DATA" | jq -r '.senior_approved')
          JUNIOR_APPROVED=$(echo "$REVIEW_DATA" | jq -r '.junior_approved')

          if [ "$SENIOR_APPROVED" = "true" ]; then
            LABEL="Ready_to_merge"
          elif [ "$JUNIOR_APPROVED" = "true" ]; then
            LABEL="Ready_for_review"
          else
            LABEL="needs_initial_review"
          fi

          gh pr edit $PR_NUMBER --add-label "$LABEL"

          if [ -n "$REQUESTERS" ]; then
            MESSAGE=$(sed "s/{reviewers}/$REQUESTERS/g; s/{author}/$AUTHOR/g" \
              ci_tools/bot_messages/rerequest_review.txt)
            gh pr comment $PR_NUMBER --body "$MESSAGE"
          elif [ "$LABEL" = "needs_initial_review" ]; then
            MESSAGE=$(sed "s/{author}/$AUTHOR/g" ci_tools/bot_messages/new_pr.txt)
            gh pr comment $PR_NUMBER --body "$MESSAGE"
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}

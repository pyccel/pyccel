name: Anaconda-Linux

on:
  workflow_dispatch:
    inputs:
      python_version:
        required: true
        type: string
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.13'
  push:
    branches: [devel, main]

jobs:
  Python_version_picker:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.repository == 'pyccel/pyccel'
    outputs:
      python_version: ${{ steps.set-python_version.outputs.python_version }}
    steps:
    - if: github.event_name == 'push'
      run: |
        echo "version=3.13" >> $GITHUB_ENV
      shell: bash
    - id: dispatch-or-call-matrix
      if: github.event_name != 'push'
      run: |
        echo "version=${{ inputs.python_version || '3.13' }}" >> $GITHUB_ENV
      shell: bash
    - id: set-python_version
      run: |
        echo "python_version=$version" >> $GITHUB_OUTPUT
      shell: bash

  Anaconda-Linux:
    runs-on: ubuntu-latest
    name: Unit tests
    needs: Python_version_picker

    steps:
      - id: duplicate_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          skip_after_successful_duplicate: 'true'
          paths: '["pyccel/stdlib/**", "pyccel/**/*.py", "tests/**/*.py", "pyccel/extensions/**", ".github/workflows/anaconda_linux.yml", ".github/actions/**"]'
          paths_ignore: '["pyccel/version.py"]'
          do_not_skip: '["workflow_dispatch", "push"]'

      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: ./.github/actions/linux_install
      - uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          auto-activate-base: true
          python-version: ${{ needs.Python_version_picker.outputs.python_version }}
      - name: Install python dependencies
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: ./.github/actions/conda_installation
        with:
          mpi_type: openmpi
          shell: bash
      - name: Coverage install
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: ./.github/actions/coverage_install
        with:
          shell_cmd: "bash -l {0}"
      - name: Fortran/C tests with pytest
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: f_c_pytest
        timeout-minutes: 60
        uses: ./.github/actions/pytest_run
        with:
          shell_cmd: "bash -l {0}"
      - name: Python tests with pytest
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: python_pytest
        timeout-minutes: 20
        uses: ./.github/actions/pytest_run_python
        with:
          shell_cmd: "bash -l {0}"
      - name: Parallel tests with pytest
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: parallel
        timeout-minutes: 20
        uses: ./.github/actions/pytest_parallel
        with:
          shell_cmd: "bash -l {0}"
      - name: Collect coverage information
        if: steps.duplicate_check.outputs.should_skip != 'true'
        continue-on-error: True
        uses: ./.github/actions/coverage_collection
        with:
          shell_cmd: "bash -l {0}"
      - name: Save code coverage report
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: .coverage
          retention-days: 1
          include-hidden-files: true

name: Pyccel Linting

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.12'

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  Pyccel-Linter:
    runs-on: ubuntu-latest
    name: Best practices (pyccel_lint, ${{ inputs.python_version }})

    steps:
      - id: duplicate_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          skip_after_successful_duplicate: 'true'
          paths: '["**/*.py", ".github/workflows/pyccel_lint.yml", ".github/actions/**"]'
          paths_ignore: '["pyccel/version.py"]'
          do_not_skip: '[]'

      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        if: steps.duplicate_check.outputs.should_skip != 'true'
        uses: ./.github/actions/linux_install
      - name: Install Pyccel
        if: steps.duplicate_check.outputs.should_skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pylint
        shell: bash
      - name: Lint
        if: steps.duplicate_check.outputs.should_skip != 'true'
        id: lint
        run: |
          python ci_tools/check_pyccel_conventions.py 2>&1 | tee $GITHUB_STEP_SUMMARY
          python ci_tools/check_pylint_commands.py 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY
        shell: bash
